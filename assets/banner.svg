<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" preserveAspectRatio="xMidYMid meet" width="1200" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c49a;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="#d4a574" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="240" fill="url(#bg)" rx="12"/>
  <rect width="1200" height="240" fill="url(#grid)" rx="12"/>
  <rect width="1200" height="240" fill="url(#dots)" rx="12"/>

  <!-- Border lines -->
  <line x1="60" y1="12" x2="1140" y2="12" stroke="#d4a574" stroke-width="0.5" opacity="0.2"/>
  <line x1="60" y1="228" x2="1140" y2="228" stroke="#d4a574" stroke-width="0.5" opacity="0.2"/>

  <!-- All content shifted right to center visually -->
  <g transform="translate(120,0)">

  <!-- === AGENT LOOP DIAMOND === -->
  <!-- Center: 170, 120 -->

  <!-- Diamond outline connecting the 4 nodes -->
  <polygon points="170,28 290,120 170,212 50,120" fill="none" stroke="#d4a574" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>

  <!-- Inner diamond (smaller) -->
  <polygon points="170,68 240,120 170,172 100,120" fill="none" stroke="#d4a574" stroke-width="0.8" opacity="0.12"/>

  <!-- Center label -->
  <text x="170" y="116" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="10" fill="#d4a574" text-anchor="middle" opacity="0.9">agent</text>
  <text x="170" y="130" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="10" fill="#d4a574" text-anchor="middle" opacity="0.9">loop</text>

  <!-- Node: Model (top) -->
  <rect x="137" y="16" width="66" height="24" rx="4" fill="#d4a574" fill-opacity="0.1" stroke="#d4a574" stroke-width="0.8" opacity="0.7"/>
  <text x="170" y="32" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="9" fill="#e8c49a" text-anchor="middle" opacity="0.9">model</text>

  <!-- Node: Tools (right) -->
  <rect x="292" y="108" width="56" height="24" rx="4" fill="#d4a574" fill-opacity="0.1" stroke="#d4a574" stroke-width="0.8" opacity="0.7"/>
  <text x="320" y="124" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="9" fill="#e8c49a" text-anchor="middle" opacity="0.9">tools</text>

  <!-- Node: Context (bottom) -->
  <rect x="129" y="200" width="82" height="24" rx="4" fill="#d4a574" fill-opacity="0.1" stroke="#d4a574" stroke-width="0.8" opacity="0.7"/>
  <text x="170" y="216" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="9" fill="#e8c49a" text-anchor="middle" opacity="0.9">context</text>

  <!-- Node: Perms (left) -->
  <rect x="-8" y="108" width="56" height="24" rx="4" fill="#d4a574" fill-opacity="0.1" stroke="#d4a574" stroke-width="0.8" opacity="0.7"/>
  <text x="20" y="124" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="9" fill="#e8c49a" text-anchor="middle" opacity="0.9">perms</text>

  <!-- Arrows on diamond edges (clockwise) -->
  <!-- Model → Tools: midpoint ~230,74 -->
  <path d="M 226,72 L 232,66 L 230,76" fill="#d4a574" opacity="0.45"/>
  <!-- Tools → Context: midpoint ~230,166 -->
  <path d="M 228,168 L 232,176 L 222,174" fill="#d4a574" opacity="0.45"/>
  <!-- Context → Perms: midpoint ~110,166 -->
  <path d="M 112,168 L 106,174 L 108,164" fill="#d4a574" opacity="0.45"/>
  <!-- Perms → Model: midpoint ~110,74 -->
  <path d="M 108,72 L 104,64 L 114,66" fill="#d4a574" opacity="0.45"/>

  <!-- === DIVIDER === -->
  <line x1="385" y1="40" x2="385" y2="200" stroke="#d4a574" stroke-width="0.5" opacity="0.15"/>

  <!-- === RIGHT SIDE === -->

  <!-- Title -->
  <text x="440" y="88" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="42" fill="#ffffff" font-weight="bold" letter-spacing="-1">Code Agents <tspan fill="url(#accent)">Playbook</tspan></text>

  <!-- Subtitle -->
  <text x="440" y="122" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="13" fill="#8888aa" letter-spacing="0.5">Based on real production agent architecture</text>

  <!-- Tags -->
  <rect x="440" y="148" width="120" height="26" rx="13" fill="#d4a574" fill-opacity="0.08" stroke="#d4a574" stroke-width="0.6" opacity="0.6"/>
  <text x="500" y="165" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="10" fill="#d4a574" text-anchor="middle" opacity="0.8">16 chapters</text>

  <rect x="578" y="148" width="148" height="26" rx="13" fill="#d4a574" fill-opacity="0.08" stroke="#d4a574" stroke-width="0.6" opacity="0.6"/>
  <text x="652" y="165" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="10" fill="#d4a574" text-anchor="middle" opacity="0.8">Python samples</text>

  <rect x="744" y="148" width="178" height="26" rx="13" fill="#d4a574" fill-opacity="0.08" stroke="#d4a574" stroke-width="0.6" opacity="0.6"/>
  <text x="833" y="165" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="10" fill="#d4a574" text-anchor="middle" opacity="0.8">build-your-own guides</text>

  <!-- Tagline -->
  <text x="440" y="206" font-family="ui-monospace,SF Mono,Menlo,monospace" font-size="11" fill="#555570" letter-spacing="0.3">Study the patterns. Build your own agent.</text>

  </g><!-- end content group -->

  <!-- Corner decorations -->
  <path d="M 20 20 L 20 36" stroke="#d4a574" stroke-width="0.6" opacity="0.3"/>
  <path d="M 20 20 L 36 20" stroke="#d4a574" stroke-width="0.6" opacity="0.3"/>
  <path d="M 1180 20 L 1180 36" stroke="#d4a574" stroke-width="0.6" opacity="0.3"/>
  <path d="M 1180 20 L 1164 20" stroke="#d4a574" stroke-width="0.6" opacity="0.3"/>
  <path d="M 20 220 L 20 204" stroke="#d4a574" stroke-width="0.6" opacity="0.3"/>
  <path d="M 20 220 L 36 220" stroke="#d4a574" stroke-width="0.6" opacity="0.3"/>
  <path d="M 1180 220 L 1180 204" stroke="#d4a574" stroke-width="0.6" opacity="0.3"/>
  <path d="M 1180 220 L 1164 220" stroke="#d4a574" stroke-width="0.6" opacity="0.3"/>
</svg>
